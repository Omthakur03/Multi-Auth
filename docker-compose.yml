services:
  db:
    image: postgres:15-alpine
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: auth_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:admin@db:5432/auth_service}
      - DB_SSL=${DB_SSL:-false}
      - PORT=${PORT:-5000}
      - NODE_ENV=${NODE_ENV:-development}
      - DOMAIN=${DOMAIN:-http://localhost}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - HRM_CLIENT_ID=${HRM_CLIENT_ID:-hrm-app}
      - HRM_CLIENT_SECRET=${HRM_CLIENT_SECRET:-hrm-super-secret-key-change-in-production}
      - CRM_CLIENT_ID=${CRM_CLIENT_ID:-crm-app}
      - CRM_CLIENT_SECRET=${CRM_CLIENT_SECRET:-crm-super-secret-key-change-in-production}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
